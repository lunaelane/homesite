document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"ac477114-ed5b-4d14-9a11-93b66da3ba08\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<script src=\"a860050d-4106-4bdb-af1c-5c1468c2f902\"><\u002Fscript>\n<style>\n*{margin:0;padding:0;box-sizing:border-box}\nhtml{scroll-behavior:smooth}\nbody{font-family:'Pretendard',-apple-system,sans-serif;background:#FFFFFF;color:#1B2A4A;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}\n::selection{background:#1B2A4A;color:#fff}\n.soha-rv{opacity:0;transform:translateY(22px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}\n.soha-rv.soha-in{opacity:1;transform:none}\n#sysFrames .sc-host-x,#sysFrames image-slot{display:block;width:100%;height:100%}\n@media(prefers-reduced-motion:reduce){.soha-rv{opacity:1 !important;transform:none !important;transition:none}}\n@media(max-width:880px){\n  .soha-grid-4{grid-template-columns:1fr 1fr !important}\n  .soha-sysgrid{grid-template-columns:1fr !important;gap:24px !important}\n  #sysSteps{display:none !important}\n  #sysTrack{height:240vh !important}\n  .soha-grid-3c{grid-template-columns:1fr !important}\n  .soha-team{grid-template-columns:1fr !important}\n  .soha-about-grid{grid-template-columns:1fr !important;gap:28px !important}\n  .soha-flow3{grid-template-columns:1fr !important}\n}\n@media(max-width:560px){ .soha-grid-4{grid-template-columns:1fr !important} }\n@media(max-width:780px){\n  .soha-navlinks{display:none !important;position:absolute;top:62px;left:0;right:0;flex-direction:column;align-items:flex-start;background:#1B2A4A;padding:20px 28px;gap:16px}\n  .soha-navlinks[data-open=\"1\"]{display:flex !important}\n  .soha-toggle{display:flex !important}\n}\n<\u002Fstyle>\n\n<\u002Fhelmet>\n\n<nav style=\"position:sticky;top:0;z-index:100;background:#1B2A4A\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:62px\">\n    <a href=\"#top\" style=\"font-size:19px;font-weight:700;color:#fff;letter-spacing:.3px;text-decoration:none\">SOHA <span style=\"font-weight:400;color:#9DB0D0;font-size:14px\">| LUNAE LANE<\u002Fspan><\u002Fa>\n    <button class=\"soha-toggle\" onclick=\"{{ toggleMenu }}\" style=\"display:none;align-items:center;justify-content:center;width:38px;height:38px;background:none;border:none;cursor:pointer;font-size:19px;color:#fff\">☰<\u002Fbutton>\n    <div class=\"soha-navlinks\" id=\"soha-navlinks\" style=\"display:flex;gap:28px;align-items:center\">\n      <a href=\"#problem\" style=\"color:#C3CFE3;text-decoration:none;font-size:14px;font-weight:500;transition:color .2s\" style-hover=\"color:#fff\">왜 해외 판매가 어려운가<\u002Fa>\n      <a href=\"#soha\" style=\"color:#C3CFE3;text-decoration:none;font-size:14px;font-weight:500;transition:color .2s\" style-hover=\"color:#fff\">SOHA란<\u002Fa>\n      <a href=\"#roles\" style=\"color:#C3CFE3;text-decoration:none;font-size:14px;font-weight:500;transition:color .2s\" style-hover=\"color:#fff\">역할 분담<\u002Fa>\n      <a href=\"#about\" style=\"color:#C3CFE3;text-decoration:none;font-size:14px;font-weight:500;transition:color .2s\" style-hover=\"color:#fff\">회사 소개<\u002Fa>\n      <a href=\"#team\" style=\"color:#C3CFE3;text-decoration:none;font-size:14px;font-weight:500;transition:color .2s\" style-hover=\"color:#fff\">팀<\u002Fa>\n      <a href=\"#\" onclick=\"{{ openInquiry }}\" style=\"color:#fff;text-decoration:none;font-size:14px;font-weight:600;border:1px solid rgba(255,255,255,.4);padding:8px 16px;border-radius:4px;transition:background .2s,color .2s\" style-hover=\"background:#fff;color:#1B2A4A\">문의하기<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<header id=\"top\" style=\"position:relative;padding:120px 0 110px;overflow:hidden;background:#0F1A33\">\n  <img src=\"4f857abb-9d2c-4ba9-ac99-b6d95b788c2e\" alt=\"\" aria-hidden=\"true\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0\">\n  <div aria-hidden=\"true\" style=\"position:absolute;inset:0;z-index:1;background:linear-gradient(105deg,rgba(9,15,28,.96) 0%,rgba(13,21,38,.9) 44%,rgba(18,29,50,.8) 74%,rgba(20,32,55,.72) 100%)\"><\u002Fdiv>\n  <div style=\"position:relative;z-index:2;max-width:1120px;margin:0 auto;padding:0 40px\">\n    <div style=\"width:48px;height:3px;background:#fff;margin-bottom:26px\"><\u002Fdiv>\n    <h1 style=\"font-size:clamp(36px,5vw,52px);font-weight:700;line-height:1.28;letter-spacing:-1.4px;color:#fff;margin-bottom:24px;max-width:820px\">상품등록만으로<br>해외 판매를 시작하세요<\u002Fh1>\n    <p style=\"font-size:clamp(17px,2vw,19px);line-height:1.78;color:#D5DCEA;max-width:560px;margin-bottom:38px\">루네레인은 한국 패션 쇼핑몰이 추가적인 해외 운영 부담 없이 판매 채널을 확장할 수 있도록 지원합니다. 별도의 해외 운영 인력이나 플랫폼 학습 없이, 기존 운영을 유지하면서 해외 판매를 시작하세요.<\u002Fp>\n    <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n      <a href=\"#\" onclick=\"{{ openBrochure }}\" style=\"display:inline-flex;align-items:center;padding:15px 30px;font-size:15px;font-weight:600;background:#fff;color:#1B2A4A;border-radius:4px;text-decoration:none;transition:transform .25s,box-shadow .25s\" style-hover=\"transform:translateY(-2px);box-shadow:0 12px 26px rgba(0,0,0,.28)\">서비스 소개자료 받기<\u002Fa>\n      <a href=\"#\" onclick=\"{{ openInquiry }}\" style=\"display:inline-flex;align-items:center;padding:15px 30px;font-size:15px;font-weight:600;background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5);border-radius:4px;text-decoration:none;transition:background .25s,color .25s\" style-hover=\"background:#fff;color:#1B2A4A\">문의하기<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<section id=\"problem\" style=\"padding:104px 0;background:#FFFFFF\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n    <div class=\"soha-rv\" style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#9AA3B5;margin-bottom:14px\">THE PROBLEM<\u002Fdiv>\n    <h2 class=\"soha-rv\" style=\"font-size:clamp(26px,3.4vw,38px);font-weight:700;color:#1B2A4A;letter-spacing:-1px;margin-bottom:14px;line-height:1.32\">왜 해외 판매가 어려울까요?<\u002Fh2>\n    <p class=\"soha-rv\" style=\"color:#566074;font-size:17px;max-width:560px;margin-bottom:56px\">진출하고 싶어도, 넘어야 할 운영의 벽이 너무 많습니다.<\u002Fp>\n    <div class=\"soha-grid-4\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid #E6E6E6;border-left:1px solid #E6E6E6\">\n      <sc-for list=\"{{ problems }}\" as=\"p\" hint-placeholder-count=\"4\">\n        <div class=\"soha-rv\" style=\"padding:32px 28px;border-right:1px solid #E6E6E6;border-bottom:1px solid #E6E6E6\">\n          <div style=\"color:#1B2A4A;margin-bottom:18px\"><i data-lucide=\"{{ p.icon }}\" style=\"width:24px;height:24px\"><\u002Fi><\u002Fdiv>\n          <div style=\"font-size:17px;font-weight:700;color:#1B2A4A;margin-bottom:9px\">{{ p.title }}<\u002Fdiv>\n          <div style=\"font-size:15px;color:#566074;line-height:1.62\">{{ p.desc }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div class=\"soha-rv\" style=\"margin-top:48px;padding:34px 40px;background:#1B2A4A;border-radius:6px\">\n      <p style=\"font-size:clamp(19px,2.4vw,24px);font-weight:700;color:#fff;letter-spacing:-.4px;line-height:1.5\">해외 판매를 막는 것은 상품이 아니라 운영입니다.<\u002Fp>\n      <p style=\"font-size:16px;color:#AEBDD8;margin-top:8px\">SOHA가 그 운영 부담을 대신 줄여드립니다.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"why\" style=\"padding:104px 0;background:#F4F6FA;border-top:1px solid #E6E6E6;border-bottom:1px solid #E6E6E6\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n    <div class=\"soha-rv\" style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#9AA3B5;margin-bottom:14px\">WHY LUNAE LANE<\u002Fdiv>\n    <h2 class=\"soha-rv\" style=\"font-size:clamp(26px,3.4vw,38px);font-weight:700;color:#1B2A4A;letter-spacing:-1px;margin-bottom:14px;line-height:1.32\">왜 루네레인일까요?<\u002Fh2>\n    <p class=\"soha-rv\" style=\"color:#566074;font-size:17px;max-width:560px;margin-bottom:52px\">새로운 부담을 더하지 않고, 지금 그대로 해외로 넓힙니다.<\u002Fp>\n    <div class=\"soha-grid-4\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:24px\">\n      <sc-for list=\"{{ reasons }}\" as=\"r\" hint-placeholder-count=\"4\">\n        <div class=\"soha-rv\" style=\"border-top:2px solid #1B2A4A;padding-top:20px\">\n          <div style=\"color:#1B2A4A;margin-bottom:14px\"><i data-lucide=\"{{ r.icon }}\" style=\"width:22px;height:22px\"><\u002Fi><\u002Fdiv>\n          <div style=\"font-size:17px;font-weight:700;color:#1B2A4A;margin-bottom:8px\">{{ r.title }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;color:#566074;line-height:1.62\">{{ r.desc }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"soha\" style=\"padding:104px 0;background:#FFFFFF\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n    <div class=\"soha-rv\" style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#9AA3B5;margin-bottom:14px\">WHAT IS SOHA<\u002Fdiv>\n    <h2 class=\"soha-rv\" style=\"font-size:clamp(26px,3.4vw,38px);font-weight:700;color:#1B2A4A;letter-spacing:-1px;margin-bottom:14px;line-height:1.32\">SOHA는 쇼핑몰과 해외를 잇습니다<\u002Fh2>\n    <p class=\"soha-rv\" style=\"color:#566074;font-size:17px;max-width:620px;margin-bottom:52px;line-height:1.75\">SOHA는 루네레인의 자체 운영 시스템으로, 쇼핑몰과 해외 플랫폼을 연결하여 해외 판매 과정을 보다 효율적으로 운영할 수 있도록 지원합니다.<\u002Fp>\n    <div class=\"soha-flow3\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n      <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div class=\"soha-rv\" style=\"background:{{ s.bg }};border:1px solid {{ s.border }};border-radius:6px;padding:26px 22px\">\n          <div style=\"font-size:12px;font-weight:700;letter-spacing:1px;color:{{ s.stepColor }};margin-bottom:12px\">{{ s.step }}<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:700;color:{{ s.titleColor }};margin-bottom:6px\">{{ s.title }}<\u002Fdiv>\n          <div style=\"font-size:14px;color:{{ s.subColor }};line-height:1.55\">{{ s.sub }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"roles\" style=\"padding:104px 0;background:#F4F6FA;border-top:1px solid #E6E6E6;border-bottom:1px solid #E6E6E6\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n    <div class=\"soha-rv\" style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#9AA3B5;margin-bottom:14px\">DIVISION OF WORK<\u002Fdiv>\n    <h2 class=\"soha-rv\" style=\"font-size:clamp(26px,3.4vw,38px);font-weight:700;color:#1B2A4A;letter-spacing:-1px;margin-bottom:14px;line-height:1.32\">쇼핑몰은 기존 운영을 유지합니다<\u002Fh2>\n    <p class=\"soha-rv\" style=\"color:#566074;font-size:17px;max-width:560px;margin-bottom:52px\">쇼핑몰은 기존 운영을 그대로 유지하고, 복잡한 해외 운영은 SOHA가 맡습니다.<\u002Fp>\n    <div class=\"soha-grid-3c\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #E6E6E6;border-radius:6px;overflow:hidden\">\n      <div class=\"soha-rv\" style=\"padding:42px 40px;border-right:1px solid #E6E6E6\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.5px;color:#9AA3B5;margin-bottom:6px\">평소 하던 일 그대로<\u002Fdiv>\n        <div style=\"font-size:22px;font-weight:700;color:#1B2A4A;margin-bottom:28px\">쇼핑몰이 유지하는 업무<\u002Fdiv>\n        <ul style=\"list-style:none;display:flex;flex-direction:column;gap:14px\">\n          <sc-for list=\"{{ youList }}\" as=\"i\" hint-placeholder-count=\"3\">\n            <li style=\"display:flex;align-items:center;gap:12px;font-size:16px;font-weight:500;color:#1B2A4A\"><span style=\"color:#1B2A4A;display:inline-flex\"><i data-lucide=\"check\" style=\"width:18px;height:18px\"><\u002Fi><\u002Fspan>{{ i.t }}<\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"soha-rv\" style=\"padding:42px 40px;background:#1B2A4A\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.5px;color:#9DB0D0;margin-bottom:6px\">복잡한 해외 운영 전부<\u002Fdiv>\n        <div style=\"font-size:22px;font-weight:700;color:#fff;margin-bottom:28px\">SOHA가 지원하는 업무<\u002Fdiv>\n        <ul style=\"list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <sc-for list=\"{{ sohaList }}\" as=\"i\" hint-placeholder-count=\"6\">\n            <li style=\"display:flex;align-items:center;gap:11px;font-size:15.5px;font-weight:500;color:#E4E9F2\"><span style=\"color:#9DB0D0;display:inline-flex\"><i data-lucide=\"check\" style=\"width:17px;height:17px\"><\u002Fi><\u002Fspan>{{ i.t }}<\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"system\" style=\"background:#FFFFFF\">\n  <div id=\"sysTrack\" style=\"position:relative;height:300vh\">\n    <div style=\"position:sticky;top:0;height:100vh;display:flex;align-items:center;overflow:hidden;background:#FFFFFF\">\n      <div style=\"max-width:1400px;margin:0 auto;padding:0 36px;width:100%\">\n        <div style=\"text-align:center;margin-bottom:24px\">\n          <div class=\"soha-rv\" style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#9AA3B5;margin-bottom:12px\">THE SYSTEM<\u002Fdiv>\n          <h2 class=\"soha-rv\" style=\"font-size:clamp(26px,3.4vw,38px);font-weight:700;color:#1B2A4A;letter-spacing:-1px;margin-bottom:12px;line-height:1.32\">실제 시스템 화면<\u002Fh2>\n          <p class=\"soha-rv\" style=\"color:#566074;font-size:16px\">스크롤하면 시스템 화면이 차례로 전환됩니다.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"soha-sysgrid\" style=\"display:grid;grid-template-columns:190px 1fr;gap:30px;align-items:center\">\n          <div id=\"sysSteps\" style=\"display:flex;flex-direction:column;gap:6px\">\n            <sc-for list=\"{{ screens }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <div class=\"soha-sysstep\" data-idx=\"{{ s.idx }}\" style=\"position:relative;padding:16px 18px 16px 22px;border-radius:8px;transition:background .35s\">\n                <span class=\"soha-sysbar\" style=\"position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;background:#E6E6E6;transition:background .35s\"><\u002Fspan>\n                <div style=\"display:flex;align-items:center;gap:11px\">\n                  <span class=\"soha-sysnum\" style=\"font-size:12px;font-weight:700;color:#9AA3B5;transition:color .35s\">{{ s.num }}<\u002Fspan>\n                  <span class=\"soha-systitle\" style=\"font-size:15.5px;font-weight:600;color:#566074;transition:color .35s\">{{ s.label }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"perspective:1600px\">\n            <div style=\"background:#FFFFFF;border:1px solid #E6E6E6;border-radius:10px;overflow:hidden;box-shadow:0 30px 70px rgba(27,42,74,.16)\">\n              <div id=\"sysFrames\" style=\"position:relative;width:100%;aspect-ratio:16/9;background:#FFFFFF\">\n                <sc-for list=\"{{ screens }}\" as=\"s\" hint-placeholder-count=\"4\">\n                  <div class=\"soha-sysframe\" data-idx=\"{{ s.idx }}\" data-label=\"{{ s.label }}\" style=\"position:absolute;inset:0;will-change:opacity,transform\">\n                    <x-import component-from-global-scope=\"image-slot\" from=\"5f282cae-4341-4b7a-8cb9-97dcd979bbce#/image-slot.js\" id=\"{{ s.id }}\" shape=\"rect\" fit=\"{{ s.fit }}\" src=\"{{ s.src }}\" placeholder=\"{{ s.label }} — 이미지를 드롭하세요\" hint-size=\"100%,100%\" style=\"display:block;width:100%;height:100%;background:#FFFFFF\"><\u002Fx-import>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"about\" style=\"padding:104px 0;background:#1B2A4A\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n    <div class=\"soha-about-grid\" style=\"display:grid;grid-template-columns:0.9fr 1.1fr;gap:60px;align-items:start\">\n      <div>\n        <div class=\"soha-rv\" style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#9DB0D0;margin-bottom:18px\">ABOUT LUNAE LANE<\u002Fdiv>\n        <h2 class=\"soha-rv\" style=\"font-size:clamp(26px,3.2vw,36px);font-weight:700;color:#fff;letter-spacing:-1px;line-height:1.34;margin-bottom:26px\">쇼핑몰의 해외 진출을 잇는<br>글로벌 커머스 기업<\u002Fh2>\n        <div class=\"soha-rv\" style=\"display:flex;flex-wrap:wrap;gap:9px\">\n          <sc-for list=\"{{ keywords }}\" as=\"k\" hint-placeholder-count=\"4\">\n            <span style=\"font-size:13px;font-weight:600;color:#C3CFE3;border:1px solid rgba(255,255,255,.2);padding:8px 14px;border-radius:4px\">{{ k }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:20px;padding-top:4px\">\n        <p class=\"soha-rv\" style=\"font-size:17px;line-height:1.78;color:#E4E9F2\">루네레인은 한국 패션 쇼핑몰이 해외 판매를 보다 쉽게 시작할 수 있도록 지원하는 글로벌 커머스 기업입니다.<\u002Fp>\n        <p class=\"soha-rv\" style=\"font-size:16px;line-height:1.78;color:#AEBDD8\">자체 운영 시스템인 <strong style=\"color:#fff;font-weight:700\">SOHA<\u002Fstrong>를 기반으로 해외 판매 운영을 지원하며, 쇼핑몰이 상품과 브랜드에 더욱 집중할 수 있는 환경을 만드는 것을 목표로 합니다.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"team\" style=\"padding:104px 0;background:#FFFFFF;border-top:1px solid #E6E6E6\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n    <div class=\"soha-rv\" style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#9AA3B5;margin-bottom:14px\">OUR TEAM<\u002Fdiv>\n    <h2 class=\"soha-rv\" style=\"font-size:clamp(26px,3.4vw,38px);font-weight:700;color:#1B2A4A;letter-spacing:-1px;margin-bottom:14px;line-height:1.32\">팀 소개<\u002Fh2>\n    <p class=\"soha-rv\" style=\"color:#566074;font-size:17px;max-width:560px;margin-bottom:52px\">커머스와 기술, 운영을 아우르는 팀이 함께합니다.<\u002Fp>\n    <div class=\"soha-team\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid #E6E6E6;border-left:1px solid #E6E6E6\">\n      <sc-for list=\"{{ team }}\" as=\"m\" hint-placeholder-count=\"3\">\n        <div class=\"soha-rv\" style=\"padding:38px 34px;border-right:1px solid #E6E6E6;border-bottom:1px solid #E6E6E6\">\n          <div style=\"display:inline-flex;align-items:center;font-size:12px;font-weight:700;letter-spacing:1px;color:#1B2A4A;border:1px solid #1B2A4A;padding:5px 11px;border-radius:4px;margin-bottom:24px\">{{ m.role }}<\u002Fdiv>\n          <div style=\"font-size:22px;font-weight:700;color:#1B2A4A;margin-bottom:8px\">{{ m.name }}<\u002Fdiv>\n          <div style=\"font-size:15px;color:#566074;padding-top:13px;border-top:1px solid #EDEDED\">{{ m.area }}<\u002Fdiv>\n          <a href=\"mailto:{{ m.email }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13.5px;color:#566074;text-decoration:none;margin-top:12px;transition:color .2s\" style-hover=\"color:#1B2A4A\"><i data-lucide=\"mail\" style=\"width:15px;height:15px\"><\u002Fi>{{ m.email }}<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"contact\" style=\"padding:104px 0;background:#1B2A4A;text-align:center\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 40px\">\n    <h2 class=\"soha-rv\" style=\"font-size:clamp(26px,3.4vw,38px);font-weight:700;color:#fff;letter-spacing:-1px;margin-bottom:14px;line-height:1.32\">해외 판매를 함께 시작해보세요<\u002Fh2>\n    <p class=\"soha-rv\" style=\"color:#AEBDD8;font-size:17px;max-width:520px;margin:0 auto 36px;line-height:1.7\">관심 있으시다면 서비스 소개자료를 받아보시거나 편하게 문의해 주세요.<\u002Fp>\n    <div class=\"soha-rv\" style=\"display:flex;gap:12px;flex-wrap:wrap;justify-content:center\">\n      <a href=\"#\" onclick=\"{{ openBrochure }}\" style=\"display:inline-flex;align-items:center;padding:15px 30px;font-size:15px;font-weight:600;background:#fff;color:#1B2A4A;border-radius:4px;text-decoration:none;transition:transform .25s\" style-hover=\"transform:translateY(-2px)\">서비스 소개자료 받기<\u002Fa>\n      <a href=\"#\" onclick=\"{{ openInquiry }}\" style=\"display:inline-flex;align-items:center;padding:15px 30px;font-size:15px;font-weight:600;background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:4px;text-decoration:none;transition:background .25s,color .25s\" style-hover=\"background:#fff;color:#1B2A4A\">문의하기<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"padding:46px 0;background:#142138\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px\">\n    <div style=\"font-size:18px;font-weight:700;color:#fff\">SOHA <span style=\"font-weight:400;color:#9DB0D0;font-size:13px\">| LUNAE LANE Inc.<\u002Fspan><\u002Fdiv>\n    <div style=\"font-size:13.5px;color:#9DB0D0;text-align:right;line-height:1.7\">contact@lunaelane.com<br>© 2026 LUNAELANE Inc. All rights reserved.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;z-index:1000;background:rgba(9,15,28,.62);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px\">\n    <div onclick=\"{{ stopProp }}\" style=\"background:#fff;border-radius:14px;width:100%;max-width:470px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 90px rgba(9,15,28,.45)\">\n      <div style=\"padding:34px 36px 0;position:relative\">\n        <button onclick=\"{{ closeModal }}\" aria-label=\"닫기\" style=\"position:absolute;top:22px;right:22px;width:34px;height:34px;border:none;background:#F1F3F7;border-radius:8px;cursor:pointer;color:#566074;font-size:15px;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#E4E8EF;color:#1B2A4A\">✕<\u002Fbutton>\n        <div style=\"width:42px;height:3px;background:#1B2A4A;margin-bottom:18px\"><\u002Fdiv>\n        <h3 style=\"font-size:23px;font-weight:700;color:#1B2A4A;letter-spacing:-.5px;margin-bottom:9px\">{{ modalTitle }}<\u002Fh3>\n        <p style=\"font-size:14px;color:#566074;line-height:1.6\">{{ modalSub }}<\u002Fp>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ submitForm }}\" style=\"padding:24px 36px 34px;display:flex;flex-direction:column;gap:15px\">\n          <sc-if value=\"{{ isBrochure }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:15px\">\n              <div><label for=\"b-name\" style=\"display:block;font-size:12.5px;font-weight:600;color:#3C4658;margin-bottom:6px\">성함 <span style=\"color:#C0392B\">*<\u002Fspan><\u002Flabel><input id=\"b-name\" type=\"text\" required=\"\" placeholder=\"홍길동\" style=\"width:100%;padding:11px 13px;font-size:14px;border:1px solid #D8DCE4;border-radius:7px;font-family:inherit;color:#1B2A4A;background:#fff;outline:none\" style-focus=\"border-color:#1B2A4A\"><\u002Fdiv>\n              <div><label for=\"b-company\" style=\"display:block;font-size:12.5px;font-weight:600;color:#3C4658;margin-bottom:6px\">쇼핑몰명 <span style=\"color:#C0392B\">*<\u002Fspan><\u002Flabel><input id=\"b-company\" type=\"text\" required=\"\" placeholder=\"쇼핑몰 이름\" style=\"width:100%;padding:11px 13px;font-size:14px;border:1px solid #D8DCE4;border-radius:7px;font-family:inherit;color:#1B2A4A;background:#fff;outline:none\" style-focus=\"border-color:#1B2A4A\"><\u002Fdiv>\n              <div><label for=\"b-email\" style=\"display:block;font-size:12.5px;font-weight:600;color:#3C4658;margin-bottom:6px\">이메일 <span style=\"color:#C0392B\">*<\u002Fspan><\u002Flabel><input id=\"b-email\" type=\"email\" required=\"\" placeholder=\"name@company.com\" style=\"width:100%;padding:11px 13px;font-size:14px;border:1px solid #D8DCE4;border-radius:7px;font-family:inherit;color:#1B2A4A;background:#fff;outline:none\" style-focus=\"border-color:#1B2A4A\"><\u002Fdiv>\n              <div><label for=\"b-phone\" style=\"display:block;font-size:12.5px;font-weight:600;color:#3C4658;margin-bottom:6px\">연락처<\u002Flabel><input id=\"b-phone\" type=\"tel\" placeholder=\"010-0000-0000\" style=\"width:100%;padding:11px 13px;font-size:14px;border:1px solid #D8DCE4;border-radius:7px;font-family:inherit;color:#1B2A4A;background:#fff;outline:none\" style-focus=\"border-color:#1B2A4A\"><\u002Fdiv>\n              <div><label for=\"b-url\" style=\"display:block;font-size:12.5px;font-weight:600;color:#3C4658;margin-bottom:6px\">쇼핑몰 URL<\u002Flabel><input id=\"b-url\" type=\"text\" placeholder=\"https://\" style=\"width:100%;padding:11px 13px;font-size:14px;border:1px solid #D8DCE4;border-radius:7px;font-family:inherit;color:#1B2A4A;background:#fff;outline:none\" style-focus=\"border-color:#1B2A4A\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isInquiry }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-direction:column;gap:15px\">\n              <div><label for=\"i-name\" style=\"display:block;font-size:12.5px;font-weight:600;color:#3C4658;margin-bottom:6px\">성함 <span style=\"color:#C0392B\">*<\u002Fspan><\u002Flabel><input id=\"i-name\" type=\"text\" required=\"\" placeholder=\"홍길동\" style=\"width:100%;padding:11px 13px;font-size:14px;border:1px solid #D8DCE4;border-radius:7px;font-family:inherit;color:#1B2A4A;background:#fff;outline:none\" style-focus=\"border-color:#1B2A4A\"><\u002Fdiv>\n              <div><label for=\"i-email\" style=\"display:block;font-size:12.5px;font-weight:600;color:#3C4658;margin-bottom:6px\">이메일 <span style=\"color:#C0392B\">*<\u002Fspan><\u002Flabel><input id=\"i-email\" type=\"email\" required=\"\" placeholder=\"name@company.com\" style=\"width:100%;padding:11px 13px;font-size:14px;border:1px solid #D8DCE4;border-radius:7px;font-family:inherit;color:#1B2A4A;background:#fff;outline:none\" style-focus=\"border-color:#1B2A4A\"><\u002Fdiv>\n              <div><label for=\"i-msg\" style=\"display:block;font-size:12.5px;font-weight:600;color:#3C4658;margin-bottom:6px\">문의 내용 <span style=\"color:#C0392B\">*<\u002Fspan><\u002Flabel><textarea id=\"i-msg\" required=\"\" rows=\"4\" placeholder=\"궁금한 점을 자유롭게 남겨주세요.\" style=\"width:100%;padding:11px 13px;font-size:14px;border:1px solid #D8DCE4;border-radius:7px;font-family:inherit;color:#1B2A4A;background:#fff;outline:none;resize:vertical;line-height:1.6\" style-focus=\"border-color:#1B2A4A\"><\u002Ftextarea><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <button type=\"submit\" disabled=\"{{ sending }}\" style=\"margin-top:4px;padding:14px;font-size:15px;font-weight:600;background:#1B2A4A;color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:inherit;transition:background .2s\" style-hover=\"background:#12233F\">{{ submitLabel }}<\u002Fbutton>\n          <p style=\"font-size:11.5px;color:#98A0AE;text-align:center;line-height:1.5;margin-top:2px\">입력하신 정보는 문의 응대 목적으로만 사용됩니다.<\u002Fp>\n        <\u002Fform>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:14px 36px 40px;text-align:center\">\n          <div style=\"width:56px;height:56px;border-radius:50%;background:#EAF3EC;color:#2E8B57;display:flex;align-items:center;justify-content:center;margin:14px auto 20px\"><i data-lucide=\"check\" style=\"width:28px;height:28px\"><\u002Fi><\u002Fdiv>\n          <h4 style=\"font-size:19px;font-weight:700;color:#1B2A4A;margin-bottom:10px\">정상적으로 접수되었습니다<\u002Fh4>\n          <p style=\"font-size:14px;color:#566074;line-height:1.65;margin-bottom:24px\">소중한 요청 감사합니다. 담당자가 확인 후<br>입력하신 이메일로 빠르게 연락드리겠습니다.<\u002Fp>\n          <button onclick=\"{{ closeModal }}\" style=\"padding:12px 28px;font-size:14px;font-weight:600;background:#F1F3F7;color:#1B2A4A;border:none;border-radius:7px;cursor:pointer;font-family:inherit\" style-hover=\"background:#E4E8EF\">닫기<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { modal: null, sent: false, sending: false, mailFallback: false };\n  renderVals() {\n    return {\n      problems: [\n        { icon: 'globe', title: '해외 플랫폼 운영', desc: '플랫폼마다 다른 정책과 운영 방식을 처음부터 익혀야 합니다.' },\n        { icon: 'languages', title: '국가별 번역·현지화', desc: '상품 정보를 시장별 언어와 현지 기준에 맞춰 가공해야 합니다.' },\n        { icon: 'headphones', title: '주문 및 CS 관리', desc: '여러 시장의 주문을 모으고, 현지 언어 문의에 대응해야 합니다.' },\n        { icon: 'truck', title: '해외 배송 운영', desc: '국가별 배송 절차와 물류를 직접 챙기기엔 부담이 큽니다.' },\n      ],\n      steps: [\n        { step: 'STEP 01', title: '쇼핑몰', sub: '평소처럼 상품 등록', bg: '#FFFFFF', border: '#E6E6E6', stepColor: '#16161A', titleColor: '#1B2A4A', subColor: '#566074' },\n        { step: 'STEP 02', title: 'SOHA', sub: '연동·현지화·배송·CS', bg: '#1B2A4A', border: '#1B2A4A', stepColor: '#9DB0D0', titleColor: '#FFFFFF', subColor: '#AEBDD8' },\n        { step: 'STEP 03', title: '해외 패션 플랫폼', sub: '동남아 주요 채널', bg: '#FFFFFF', border: '#E6E6E6', stepColor: '#16161A', titleColor: '#1B2A4A', subColor: '#566074' },\n        { step: 'STEP 04', title: '해외 고객', sub: '현지 환경에서 구매', bg: '#FFFFFF', border: '#E6E6E6', stepColor: '#16161A', titleColor: '#1B2A4A', subColor: '#566074' },\n      ],\n      youList: [{ t: '상품 등록' }, { t: '재고 관리' }, { t: '국내 발송' }],\n      sohaList: [{ t: '현지화' }, { t: '플랫폼 등록' }, { t: '주문 수집' }, { t: '통합 재고 관리' }, { t: '해외 배송' }, { t: 'CS (고객 응대)' }],\n      screens: [\n        { id: 'cl-product', idx: 0, num: '01', label: '상품 등록 화면', fit: 'contain', src: '' },\n        { id: 'cl-orders', idx: 1, num: '02', label: '주문·판매 현황 화면', fit: 'contain', src: '' },\n        { id: 'cl-connect', idx: 2, num: '03', label: '플랫폼 연동 화면', fit: 'contain', src: 'assets/sys-connect.png' },\n      ],\n      reasons: [\n        { icon: 'user-check', title: '추가 인력 없이', desc: '새로운 해외 운영팀을 꾸릴 필요가 없습니다.' },\n        { icon: 'wallet', title: '월 고정비 없이', desc: '매달 나가는 고정 비용 없이 해외 판매를 시작할 수 있습니다.' },\n        { icon: 'settings', title: '검증된 운영 지원', desc: '루네레인이 자체 시스템 SOHA를 통해 해외 판매 운영을 직접 지원합니다.' },\n        { icon: 'repeat', title: '기존 운영 유지', desc: '현재 운영 방식 그대로 해외 판매를 확장합니다.' },\n      ],\n      keywords: ['Global Commerce', 'B2B Solution', 'SOHA', 'K-Fashion'],\n      team: [\n        { name: '유예준', role: 'CEO', area: 'Business & Strategy', email: 'yooyejune@lunaelane.com' },\n        { name: '이승주', role: 'COO', area: 'Operation & Finance', email: 'leeseungju@lunaelane.com' },\n        { name: '이유겸', role: 'CTO', area: 'Product & Development', email: 'leeyukyum@lunaelane.com' },\n      ],\n      toggleMenu: () => {\n        const m = document.getElementById('soha-navlinks');\n        if (m) m.dataset.open = m.dataset.open === '1' ? '0' : '1';\n      },\n      modalOpen: !!this.state.modal,\n      isBrochure: this.state.modal === 'brochure',\n      isInquiry: this.state.modal === 'inquiry',\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      modalTitle: this.state.modal === 'inquiry' ? '문의하기' : '서비스 소개자료 받기',\n      modalSub: this.state.modal === 'inquiry'\n        ? '궁금한 점을 남겨주시면 담당자가 빠르게 답변드리겠습니다.'\n        : '정보를 남겨주시면 서비스 소개자료를 이메일로 보내드립니다.',\n      submitLabel: this.state.sending ? '보내는 중…' : (this.state.modal === 'inquiry' ? '문의 보내기' : '소개자료 요청하기'),\n      sending: this.state.sending,\n      mailFallback: this.state.mailFallback,\n      openBrochure: (e) => { if (e) e.preventDefault(); const m=document.getElementById('soha-navlinks'); if(m) m.dataset.open='0'; this.setState({ modal: 'brochure', sent: false }); },\n      openInquiry: (e) => { if (e) e.preventDefault(); const m=document.getElementById('soha-navlinks'); if(m) m.dataset.open='0'; this.setState({ modal: 'inquiry', sent: false }); },\n      closeModal: () => this.setState({ modal: null, sent: false }),\n      stopProp: (e) => e.stopPropagation(),\n      submitForm: (e) => {\n        e.preventDefault();\n        const g = (id) => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };\n        let payload, subject, body;\n        if (this.state.modal === 'brochure') {\n          const name=g('b-name'), company=g('b-company'), email=g('b-email'), phone=g('b-phone'), url=g('b-url');\n          subject = '[소개자료 요청] ' + company + ' / ' + name;\n          payload = { _subject: subject, 구분: '서비스 소개자료 요청', 성함: name, 쇼핑몰명: company, 이메일: email, 연락처: phone, '쇼핑몰 URL': url };\n          body = ['SOHA 서비스 소개자료를 요청합니다.','','성함: '+name,'쇼핑몰명: '+company,'이메일: '+email,'연락처: '+phone,'쇼핑몰 URL: '+url].join('\\n');\n        } else {\n          const name=g('i-name'), email=g('i-email'), msg=g('i-msg');\n          subject = '[문의] ' + name;\n          payload = { _subject: subject, 구분: '문의', 성함: name, 이메일: email, '문의 내용': msg };\n          body = ['문의 내용','──────────',msg,'','성함: '+name,'이메일: '+email].join('\\n');\n        }\n        payload._captcha = 'false';\n        payload._template = 'table';\n        this.setState({ sending: true });\n        fetch('https://formsubmit.co/ajax/contact@lunaelane.com', {\n          method: 'POST',\n          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n          body: JSON.stringify(payload),\n        })\n          .then((r) => { if (!r.ok) throw new Error('bad status'); return r.json(); })\n          .then(() => this.setState({ sending: false, sent: true, mailFallback: false }))\n          .catch(() => {\n            // Network/CORS failure — fall back to opening the visitor's mail app.\n            window.location.href = 'mailto:contact@lunaelane.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);\n            this.setState({ sending: false, sent: true, mailFallback: true });\n          });\n      },\n    };\n  }\n  componentDidMount() {\n    if (!document.getElementById('soha-font-link')) {\n      const l = document.createElement('link');\n      l.id = 'soha-font-link';\n      l.rel = 'stylesheet';\n      l.href = 'https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css';\n      document.head.appendChild(l);\n    }\n    let tries = 0;\n    const drawIcons = () => {\n      if (window.lucide && window.lucide.createIcons) { window.lucide.createIcons(); return; }\n      if (tries++ < 40) setTimeout(drawIcons, 100);\n    };\n    drawIcons();\n    this.setupReveal();\n    this.setupSystemScrub();\n  }\n  enlargeSlot(id, factor) {\n    let tries = 0;\n    const tick = () => {\n      const el = document.getElementById(id);\n      if (el) {\n        el.style.transform = 'scale(' + factor + ')';\n        el.style.transformOrigin = 'center';\n        return;\n      }\n      if (tries++ < 60) setTimeout(tick, 120);\n    };\n    tick();\n  }\n  setupSystemScrub() {\n    const track = document.getElementById('sysTrack');\n    const frames = [...document.querySelectorAll('.soha-sysframe')];\n    const steps = [...document.querySelectorAll('.soha-sysstep')];\n    const addr = document.getElementById('sysAddr');\n    if (!track || frames.length < 2) return;\n    const n = frames.length;\n    let raf = null;\n    const apply = () => {\n      raf = null;\n      const vh = window.innerHeight || 800;\n      const total = track.offsetHeight - vh;\n      const top = track.getBoundingClientRect().top;\n      let p = total > 0 ? (-top) / total : 0;\n      p = Math.max(0, Math.min(1, p));\n      const fpos = p * (n - 1);\n      frames.forEach((f, i) => {\n        const d = Math.abs(fpos - i);\n        const vis = Math.max(0, 1 - d);\n        const e = vis * vis * (3 - 2 * vis);\n        const off = i - fpos;\n        f.style.opacity = String(e);\n        f.style.transform = 'translateY(' + (off * 26) + 'px) scale(' + (0.93 + 0.07 * e) + ') rotateX(' + (off * 5) + 'deg)';\n        f.style.zIndex = String(Math.round(e * 10));\n        f.style.pointerEvents = e > 0.6 ? 'auto' : 'none';\n      });\n      const active = Math.max(0, Math.min(n - 1, Math.round(fpos)));\n      steps.forEach((s, i) => {\n        const on = i === active;\n        const bar = s.querySelector('.soha-sysbar');\n        const num = s.querySelector('.soha-sysnum');\n        const tt = s.querySelector('.soha-systitle');\n        s.style.background = on ? '#F4F6FA' : 'transparent';\n        if (bar) bar.style.background = on ? '#1B2A4A' : '#E6E6E6';\n        if (num) num.style.color = on ? '#1B2A4A' : '#9AA3B5';\n        if (tt) { tt.style.color = on ? '#1B2A4A' : '#566074'; tt.style.fontWeight = on ? '700' : '600'; }\n      });\n      if (addr && frames[active]) addr.textContent = frames[active].dataset.label;\n    };\n    const onScroll = () => { if (raf == null) raf = requestAnimationFrame(apply); };\n    addEventListener('scroll', onScroll, { passive: true, capture: true });\n    addEventListener('resize', onScroll, { passive: true });\n    this._sysScrub = onScroll;\n    apply();\n  }\n  setupReveal() {\n    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const els = [...document.querySelectorAll('.soha-rv')];\n    if (reduce) { els.forEach(el => el.classList.add('soha-in')); return; }\n    let io = null;\n    try {\n      io = new IntersectionObserver((entries) => {\n        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('soha-in'); io.unobserve(e.target); } });\n      }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });\n      els.forEach(el => io.observe(el));\n    } catch (e) {}\n    let pending = els.slice();\n    const sweep = () => {\n      const h = window.innerHeight || document.documentElement.clientHeight;\n      pending = pending.filter(el => {\n        const r = el.getBoundingClientRect();\n        if (r.top < h * 0.94 && r.bottom > -40) { el.classList.add('soha-in'); return false; }\n        return true;\n      });\n      if (!pending.length && this._revInt) { clearInterval(this._revInt); this._revInt = null; }\n    };\n    addEventListener('scroll', sweep, { passive: true });\n    addEventListener('resize', sweep, { passive: true });\n    this._revInt = setInterval(sweep, 200);\n    sweep();\n    const t0 = document.timeline ? document.timeline.currentTime : null;\n    setTimeout(() => {\n      const t1 = document.timeline ? document.timeline.currentTime : null;\n      const frozen = (t0 !== null && t1 !== null && t1 === t0);\n      els.forEach(el => {\n        const op = parseFloat(getComputedStyle(el).opacity);\n        if (frozen || op < 0.99) { el.style.transition = 'none'; el.style.opacity = '1'; el.style.transform = 'none'; el.classList.add('soha-in'); }\n      });\n    }, 1600);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
